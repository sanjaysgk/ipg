#       --outdir /fs04/scratch2/xy86/sanjay/ipg-runs/D122_lung_full

input: /fs04/scratch2/xy86/sanjay/ATLANTIS/RNAseq/Analysis/Cryptic/ipg/assets/samplesheet_D122_lung.csv

