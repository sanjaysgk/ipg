dbsnp_tbi:             /fs04/scratch2/xy86/sanjay/ATLANTIS/RNAseq/Analysis/Cryptic/variant_calling_resources/dbsnp138.vcf.gz.tbi
known_indels:          /fs04/scratch2/xy86/sanjay/ATLANTIS/RNAseq/Analysis/Cryptic/variant_calling_resources/resources_broad_hg38_v0_Homo_sapiens_assembly38.known_indels.vcf.gz
known_indels_tbi:      /fs04/scratch2/xy86/sanjay/ATLANTIS/RNAseq/Analysis/Cryptic/variant_calling_resources/resources_broad_hg38_v0_Homo_sapiens_assembly38.known_indels.vcf.gz.tbi
mills:                 /fs04/scratch2/xy86/sanjay/ATLANTIS/RNAseq/Analysis/Cryptic/variant_calling_resources/resources_broad_hg38_v0_Mills_and_1000G_gold_standard.indels.hg38.vcf.gz
