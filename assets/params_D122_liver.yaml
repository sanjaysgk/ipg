# Full-data run for D122_liver on Monash M3
#
# Usage (from repo root):
#   pixi run nextflow run . -profile pixi,monash \
#       -params-file assets/params_D122_liver.yaml \
#       --outdir /fs04/scratch2/xy86/sanjay/ipg-runs/D122_liver_full
#
# To build the reference bundle from scratch (or on another machine):
#   pixi run bash bin/build_full_reference.sh
#   # then use the auto-generated params_reference.yaml instead of this file

input: /fs04/scratch2/xy86/sanjay/ATLANTIS/RNAseq/Analysis/Cryptic/ipg/assets/samplesheet_D122_liver.csv

# ---- Reference genome (GENCODE v44, GRCh38 primary assembly) ----
# Public source: https://ftp.ebi.ac.uk/pub/databases/gencode/Gencode_human/release_44/
fasta:      /fs04/scratch2/xy86/sanjay/ATLANTIS/RNAseq/Analysis/Cryptic/GRCh38/GRCh38.primary_assembly.genome.fa
fasta_fai:  /fs04/scratch2/xy86/sanjay/ATLANTIS/RNAseq/Analysis/Cryptic/GRCh38/GRCh38.primary_assembly.genome.fa.fai
fasta_dict: /fs04/scratch2/xy86/sanjay/ATLANTIS/RNAseq/Analysis/Cryptic/GRCh38/GRCh38.primary_assembly.genome.dict
gtf:        /fs04/scratch2/xy86/sanjay/ATLANTIS/RNAseq/Analysis/Cryptic/GRCh38/gencode.v44.primary_assembly.annotation.gtf
star_index: /fs04/scratch2/xy86/sanjay/ATLANTIS/RNAseq/Analysis/Cryptic/GRCh38/star_index

# RSeQC BED (public: https://sourceforge.net/projects/rseqc/files/BED/Human_Homo_sapiens/)
