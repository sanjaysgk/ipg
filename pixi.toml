[workspace]
authors = ["sanjaysgk <44039457+sanjaysgk@users.noreply.github.com>"]
channels = ["conda-forge", "bioconda"]
name = "ipg"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
nextflow = ">=25.10.4,<26"
nf-core = ">=3.5.2,<4"
nf-test = ">=0.9.5,<0.10"
pre-commit = ">=4.5.1,<5"
prettier = ">=3.8.1,<4"
shellcheck = ">=0.11.0,<0.12"
gh = ">=2.88.1,<3"
openjdk = "17.*"
samtools = ">=1.23.1,<2"
bcftools = ">=1.23.1,<2"
seqtk = ">=1.5,<2"
star = ">=2.7.11b,<3"
gatk4 = ">=4.6.2.0,<5"
stringtie = ">=3.0.0,<4"
gffcompare = ">=0.12.10,<0.13"
gffread = ">=0.12.7,<0.13"
rseqc = ">=5.0.4,<6"
fastqc = ">=0.12.1,<0.13"
multiqc = ">=1.33,<2"
r-ggplot2 = ">=3.5.2,<4"
r-gplots = ">=3.2.0,<4"
r-gsalib = ">=2.2.1,<3"
r-tidyverse = ">=2.0.0,<3"
r-optparse = ">=1.7.5,<2"
r-venndiagram = ">=1.7.3,<2"
r-upsetr = ">=1.4.0,<2"
r-hrbrthemes = ">=0.8.7,<1"

# MS search + immunoinformatics runtime tools (for --step ms_search under
# -profile pixi). Matches the per-module environment.yml files so the
# pipeline works without containers.
# msfragger pinned to 4.1 — matches vendored SG_Neopep_fragger.params.
# Upgrade to 4.2 requires regenerating params (separate sprint).
msfragger = "==4.1"
pymzml = ">=2.5.2,<3"
mokapot = "==0.10.0"
numpy = "<2"   # mokapot 0.10.0 still references np.float_, removed in numpy 2.0
comet-ms = ">=2023010,<2024000"   # pinned to match vendored 2023.01 params files
sage-proteomics = ">=0.14.7,<0.15"
# ms2rescore + flashlfq not in the default pixi env:
# - ms2rescore→pyopenms→eigen/icu/qt6 chain has unresolvable conflicts
#   against the rest of our conda env. Tried pinning eigen 3.4.0 +
#   pyopenms <3.4 — runs into icu 73.2 mismatch next.
# - flashlfq→dotnet-runtime similarly conflicts.
# Bypass both via --skip_ms2rescore (default-true in test profile); for
# real runs use `-profile conda,...` so each module gets its own env.
blast = ">=2.15.0,<3"
biopython = ">=1.80"
matplotlib-base = ">=3.6"
logomaker = ">=0.8"
pandas = ">=1.5"
