[workspace]
authors = ["sanjaysgk <44039457+sanjaysgk@users.noreply.github.com>"]
channels = ["conda-forge", "bioconda"]
name = "ipg"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
nextflow = ">=25.10.4,<26"
nf-core = ">=3.5.2,<4"
nf-test = ">=0.9.5,<0.10"
pre-commit = ">=4.5.1,<5"
prettier = ">=3.8.1,<4"
shellcheck = ">=0.11.0,<0.12"
gh = ">=2.88.1,<3"
openjdk = "17.*"
samtools = ">=1.23.1,<2"
bcftools = ">=1.23.1,<2"
seqtk = ">=1.5,<2"
star = ">=2.7.11b,<3"
gatk4 = ">=4.6.2.0,<5"
stringtie = ">=3.0.0,<4"
gffcompare = ">=0.12.10,<0.13"
gffread = ">=0.12.7,<0.13"
rseqc = ">=5.0.4,<6"
fastqc = ">=0.12.1,<0.13"
multiqc = ">=1.33,<2"
r-ggplot2 = ">=3.5.2,<4"
r-gplots = ">=3.2.0,<4"
r-gsalib = ">=2.2.1,<3"
r-tidyverse = ">=2.0.0,<3"
r-optparse = ">=1.7.5,<2"
r-venndiagram = ">=1.7.3,<2"
r-upsetr = ">=1.4.0,<2"
r-hrbrthemes = ">=0.8.7,<1"

# MS search + immunoinformatics runtime tools (for --step ms_search under
# -profile pixi). Matches the per-module environment.yml files so the
# pipeline works without containers.
msfragger = "==4.2"
pymzml = ">=2.5.2,<3"
mokapot = "==0.10.0"
numpy = "<2"   # mokapot 0.10.0 still references np.float_, removed in numpy 2.0
comet-ms = ">=2026010,<2027000"   # bumped from 2023.01; params regenerated to match
sage-proteomics = ">=0.14.7,<0.15"
pepquery = ">=2.0.2,<3"   # PepQuery2 cryptic validation (--run_pepquery); Java/noarch, uses openjdk above
# ms2rescore + flashlfq have dependency conflicts with the main env
# (pyopenms→eigen/icu chain, dotnet-runtime). Isolated in per-feature
# pixi environments below. Use `pixi run -e ms2rescore ...` to invoke.
blast = ">=2.15.0,<3"
biopython = ">=1.80"
matplotlib-base = ">=3.6"
logomaker = ">=0.8"
pandas = ">=1.5,<2.2"   # mokapot 0.10.0 uses pd.to_numeric(errors="ignore"), removed in pandas 2.2+
bwa = ">=0.7.19,<0.8"

# ── Isolated feature environments ──
# These avoid dependency conflicts with the main env.
# Nextflow modules use: beforeScript 'eval "$(pixi shell-hook -e ms2rescore)"'

[feature.ms2rescore.dependencies]
ms2rescore = "==3.2.1"
python = ">=3.10,<3.12"
percolator = ">=3.06"   # optional MS2Rescore rescoring_engine (params.ms2rescore_engine = percolator)

# Dev-only tooling (NOT used by the pipeline). marker-pdf: PDF -> markdown for
# reading papers during development. Isolated env: `pixi run -e dev ...`.
[feature.dev.dependencies]
python = ">=3.10,<3.13"
pip = "*"

[feature.dev.pypi-dependencies]
marker-pdf = "*"

[environments]
ms2rescore = { features = ["ms2rescore"], no-default-feature = true, solve-group = "ms2rescore" }
dev = { features = ["dev"], no-default-feature = true, solve-group = "dev" }

[pypi-dependencies]
nf-metro = ">=0.7.1, <0.8"
