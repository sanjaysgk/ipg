name: combine_fasta
description: Concatenate two or more FASTA files (gzipped or plain) into one search database
keywords:
  - fasta
  - concatenate
  - database
  - canonical
  - cryptic
tools:
  - gzip:
      description: GNU gzip / zcat
      homepage: https://www.gnu.org/software/gzip/
      licence: ["GPL-3.0-or-later"]
input:
  - - meta:
        type: map
        description: Groovy map keyed to the database (id = db basename, key = db path)
    - fastas:
        type: file
        description: Two or more FASTA files (.fasta or .fasta.gz), concatenated in order
        pattern: "*.{fasta,fa,fasta.gz,fa.gz}"
output:
  - fasta:
      - meta:
          type: map
          description: Groovy map keyed to the database
      - "${prefix}.fasta":
          type: file
          description: Combined plain FASTA
          pattern: "*.fasta"
  - versions:
      - "versions.yml":
          type: file
          description: File containing software versions
          pattern: "versions.yml"
authors:
  - "@sanjaysgk"
