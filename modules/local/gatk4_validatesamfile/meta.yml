---
name: gatk4_validatesamfile
description: |
  Validate a BAM/SAM/CRAM file against the SAM/BAM specification using GATK4
  ValidateSamFile. Local module; not yet available in nf-core/modules upstream.
keywords:
  - bam
  - validation
  - gatk4
tools:
  - gatk4:
      description: |
        Developed in the Data Sciences Platform at the Broad Institute, the toolkit
        offers a wide variety of tools with a primary focus on variant discovery and
        genotyping. Its powerful processing engine and high-performance computing
        features make it capable of taking on projects of any size.
      homepage: https://gatk.broadinstitute.org/hc/en-us
      documentation: https://gatk.broadinstitute.org/hc/en-us/categories/360002369672s
      doi: 10.1158/1538-7445.AM2017-3590
      licence: ["Apache-2.0"]

input:
  - - meta:
        type: map
        description: Sample metadata
    - bam:
        type: file
        description: BAM/SAM/CRAM to validate
        pattern: "*.{bam,sam,cram}"
  - - meta2:
        type: map
        description: Reference metadata
    - fasta:
        type: file
        description: Reference FASTA
        pattern: "*.{fa,fasta}"
  - - meta3:
        type: map
        description: Reference metadata
    - fai:
        type: file
        description: Reference FASTA index
        pattern: "*.fai"
  - - meta4:
        type: map
        description: Reference metadata
    - dict:
        type: file
        description: Reference sequence dictionary
        pattern: "*.dict"

output:
  - summary:
      - meta:
          type: map
          description: Sample metadata
      - "*.txt":
          type: file
          description: Validation summary report
          pattern: "*.txt"
  - versions_gatk4:
      - "versions.yml":
          type: file
          description: GATK4 version
          pattern: "versions.yml"

authors:
  - "@sanjaysgk"
maintainers:
  - "@sanjaysgk"
