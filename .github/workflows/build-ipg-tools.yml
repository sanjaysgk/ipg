name: Build ipg-tools container

on:
  push:
    branches:
      - main
    paths:
      - "containers/ipg-tools/**"
      - ".github/workflows/build-ipg-tools.yml"
  pull_request:
    paths:
      - "containers/ipg-tools/**"
      - ".github/workflows/build-ipg-tools.yml"
  workflow_dispatch:

# Cancel in-progress runs on newer commits to the same branch/PR.
concurrency:
  group: build-ipg-tools-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ipg-tools

jobs:
  build-and-push:
    name: Build & publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short
            type=ref,event=tag,pattern=ipg-tools-v(.*),group=1

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: containers/ipg-tools
          file: containers/ipg-tools/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test built image
        if: github.event_name != 'pull_request'
        run: |
          docker run --rm \
              "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-$(git rev-parse --short HEAD)" \
              bash -c 'set -eu; for t in curate_vcf revert_headers alt_liftover triple_translate squish; do
                test -x "/usr/local/bin/$t" || { echo "missing: $t"; exit 1; };
                ldd "/usr/local/bin/$t" | grep -E "not found|undefined" && exit 1 || true;
                echo "OK: $t";
              done'
