name: Build ipg-tools container

on:
  push:
    branches:
      - main
    paths:
      - "containers/ipg-tools/**"
      - ".github/workflows/build-ipg-tools.yml"
  pull_request:
    paths:
      - "containers/ipg-tools/**"
      - ".github/workflows/build-ipg-tools.yml"
  workflow_dispatch:

# Cancel in-progress runs on newer commits to the same branch/PR.
concurrency:
  group: build-ipg-tools-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ipg-tools
  # Keep in sync with ARG IPG_REPO_SHA in containers/ipg-tools/Dockerfile
  IPG_REPO_SHA: fef8e68ab86dac49070542fe40b477ec76058aaa

jobs:
  build-and-push:
    name: Build & publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=sha-${{ env.IPG_REPO_SHA }}
            type=sha,format=short
            type=ref,event=tag,pattern=ipg-tools-v(.*),group=1

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: containers/ipg-tools
          file: containers/ipg-tools/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IPG_REPO_SHA=${{ env.IPG_REPO_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify SHA pin matches Dockerfile
        run: |
          dockerfile_sha=$(awk -F= '/^ARG IPG_REPO_SHA=/ {print $2}' containers/ipg-tools/Dockerfile | tr -d '[:space:]')
          if [ "${dockerfile_sha}" != "${IPG_REPO_SHA}" ]; then
            echo "::error::IPG_REPO_SHA drift: Dockerfile=${dockerfile_sha} workflow=${IPG_REPO_SHA}"
            exit 1
          fi
          echo "SHA pin OK: ${dockerfile_sha}"

      - name: Smoke test built image
        if: github.event_name != 'pull_request'
        run: |
          docker run --rm \
              "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ env.IPG_REPO_SHA }}" \
              bash -c 'set -eu; for t in curate_vcf revert_headers alt_liftover triple_translate squish; do
                         test -x "/usr/local/bin/$t" || { echo "missing: $t"; exit 1; };
                         ldd "/usr/local/bin/$t" | grep -E "not found|undefined" && exit 1 || true;
                         echo "OK: $t";
                       done'
