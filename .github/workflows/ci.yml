name: nf-core CI
# Verify the pipeline parses cleanly under multiple Nextflow versions and
# multiple container engines. The legacy nf-core template ran the full
# pipeline against a `-profile test` dataset on every PR; sanjaysgk/ipg's
# `test` profile points at a chr22-subset bundle on Monash M3 scratch
# (built locally by `bin/build_test_bundle.sh`) which is not accessible
# from GitHub Actions runners. Until we publish a CI-accessible test
# bundle (e.g. fork of nf-core/test-datasets) the CI verifies that the
# repo parses cleanly under each profile combination.
#
# To run the full end-to-end test locally instead:
#     pixi install
#     pixi run bash bin/build_test_bundle.sh
#     pixi run nextflow run . -profile test,pixi --outdir results

on:
  push:
    branches:
      - main
      - dev
      - dev/cryptic-port
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

env:
  NXF_ANSI_LOG: false

concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  parse:
    name: "Parse pipeline (${{ matrix.NXF_VER }} | ${{ matrix.profile }})"
    if: "${{ github.event_name != 'push' || (github.event_name == 'push' && github.repository == 'sanjaysgk/ipg') }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Pinned to two stable Nextflow LTS releases. We deliberately do
        # NOT include `latest-everything` (currently 26.3.2-edge) because
        # it has a strict-parser regression that rejects ${manifest.X}
        # forward-reference interpolation inside the validation.help
        # beforeText / afterText strings — the same template the nf-core
        # template ships verbatim. Will revisit when 26.x stabilises and
        # the nf-core template catches up.
        NXF_VER:
          - "24.04.2"
          - "25.10.4"
        profile:
          - "docker"
          - "singularity"
    steps:
      - name: Check out pipeline code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Set up Nextflow
        uses: nf-core/setup-nextflow@v2
        with:
          version: "${{ matrix.NXF_VER }}"

      - name: "Parse pipeline config (${{ matrix.profile }})"
        run: |
          set -euo pipefail
          nextflow config ${GITHUB_WORKSPACE} -profile ${{ matrix.profile }} > nextflow.config.dump 2>&1 || {
              echo "::error::nextflow config -profile ${{ matrix.profile }} FAILED — output:"
              cat nextflow.config.dump
              exit 1
          }
          echo "Pipeline config parses cleanly with -profile ${{ matrix.profile }}"

      - name: "Parse with test profile chained (${{ matrix.profile }})"
        run: |
          set -euo pipefail
          nextflow config ${GITHUB_WORKSPACE} -profile test,${{ matrix.profile }} > nextflow.testconfig.dump 2>&1 || {
              echo "::error::nextflow config -profile test,${{ matrix.profile }} FAILED — output:"
              cat nextflow.testconfig.dump
              exit 1
          }
          echo "Pipeline config parses cleanly with -profile test,${{ matrix.profile }}"
